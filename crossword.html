  <canvas id="proximity-grid" aria-hidden="true"></canvas>
  <script>
  (function(){
    var canvas = document.getElementById('proximity-grid');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var mouse = { x: -9999, y: -9999 };
    var CELL = 36;
    var RADIUS = 180;
    var BASE_ALPHA = 0.045;
    var GLOW_ALPHA = 0.72;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      var cols = Math.ceil(canvas.width  / CELL) + 1;
      var rows = Math.ceil(canvas.height / CELL) + 1;

      for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
          var x = c * CELL;
          var y = r * CELL;
          var dx = x - mouse.x;
          var dy = y - mouse.y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          var proximity = Math.max(0, 1 - dist / RADIUS);
          var alpha = BASE_ALPHA + proximity * proximity * (GLOW_ALPHA - BASE_ALPHA);

          ctx.beginPath();
          ctx.arc(x, y, 1.4, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(84, 145, 209,' + alpha.toFixed(3) + ')';
          ctx.fill();
        }
      }

      ctx.setLineDash([]);
      for (var r2 = 0; r2 < rows; r2++) {
        var y2 = r2 * CELL;
        ctx.beginPath();
        ctx.moveTo(0, y2);
        ctx.lineTo(canvas.width, y2);
        var distH = Math.abs(mouse.y - y2);
        var pxH = Math.max(0, 1 - distH / RADIUS);
        ctx.strokeStyle = 'rgba(84, 145, 209,' + (BASE_ALPHA * 0.7 + pxH * pxH * 0.30).toFixed(3) + ')';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
      for (var c2 = 0; c2 < cols; c2++) {
        var x2 = c2 * CELL;
        ctx.beginPath();
        ctx.moveTo(x2, 0);
        ctx.lineTo(x2, canvas.height);
        var distV = Math.abs(mouse.x - x2);
        var pxV = Math.max(0, 1 - distV / RADIUS);
        ctx.strokeStyle = 'rgba(84, 145, 209,' + (BASE_ALPHA * 0.7 + pxV * pxV * 0.30).toFixed(3) + ')';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }

    function loop() { draw(); requestAnimationFrame(loop); }

    window.addEventListener('mousemove', function(e){ mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('touchmove', function(e){ if(e.touches[0]){ mouse.x=e.touches[0].clientX; mouse.y=e.touches[0].clientY; } }, {passive:true});
    window.addEventListener('resize', resize);
    resize();
    loop();
  })();
  </script>

  <div class="math-bg-layer" aria-hidden="true"></div>
  <script>
  (function(){
    const symbols = [
      "$\\pi$", "$e$", "$i$", "$\\infty$", "$\\Sigma$", "$\\int$", "$\\sqrt{}$",
      "$dx$", "$\\Delta$", "$\\nabla$", "$\\alpha$", "$\\beta$", "$\\gamma$",
      "$\\lambda$", "$\\mu$", "$\\theta$", "$\\varphi$", "$\\psi$", "$\\emptyset$",
      "$\\in$", "$\\Omega$", "$f(x)$", "$n!$", "$x^2$", "$2\\pi r$", "$\\pi r^2$",
      "$a^2+b^2=c^2$", "$\\lim$", "$\\log n$", "$P(A|B)$", "$\\det(A)$",
      "$\\oint$", "$\\bmod p$", "$C(n,k)$", "$\\gcd$", "$\\operatorname{lcm}$",
      "$\\mathbb{N}$", "$\\mathbb{Z}$", "$\\mathbb{Q}$", "$\\mathbb{R}$",
      "$\\mathbb{C}$", "$\\mathbb{P}$", "$\\mathbb{H}$", "$\\sigma^2$",
      "$E[X]$", "$\\operatorname{Var}(X)$", "$\\sin^2+\\cos^2=1$", "$=$",
      "$\\neq$", "$\\approx$", "$\\cong$", "$\\simeq$", "$\\leq$", "$\\geq$",
      "$\\frac{d}{dx}$", "$ax^2+bx+c$", "$y=mx+b$", "$e^{i\\pi}+1=0$"
    ];
    var layer = document.querySelector(".math-bg-layer");
    if (!layer) return;
    for (var k = 0; k < 58; k++) {
      (function(idx){
        var el = document.createElement("span");
        el.className = "math-symbol";
        el.textContent = symbols[idx % symbols.length];
        var size  = 0.85 + Math.random() * 1.5;
        var dur   = 22 + Math.random() * 30;
        var delay = -(Math.random() * dur);
        var left  = Math.random() * 98;
        var rot   = (Math.random() - 0.5) * 50;
        el.style.cssText = "left:" + left + "%;font-size:" + size + "rem;animation-duration:" + dur + "s;animation-delay:" + delay + "s;--rot:" + rot + "deg;";
        layer.appendChild(el);
      })(k + Math.floor(Math.random() * symbols.length));
    }
  })();
  </script>

  <script src="./crossword_data.js"></script>
  <script>
  (function () {
    let current = 0;
    let PATH = "crossword_pdfs/";

    const problemSelect    = document.getElementById('problemSelect');
    const problemPdfFrame  = document.getElementById('problemPdfFrame');
    const solutionPdfFrame = document.getElementById('solutionPdfFrame');
    const statusText       = document.getElementById('statusText');
    const solutionBox      = document.getElementById('solutionBox');
    const inputs           = [0, 1, 2, 3].map(i => document.getElementById('c' + i));
    const checkBtn         = document.getElementById('checkBtn');
    const clearBtn         = document.getElementById('clearBtn');
    const giveUpBtn        = document.getElementById('giveUpBtn');

    /* ── Populate select ── */
    function populateSelect() {
      crosswordData.forEach(function (entry, idx) {
        var o = document.createElement('option');
        o.value = idx;
        o.textContent = entry.name;

        if (entry.disabled) {
          o.disabled = true;
        }
        problemSelect.appendChild(o);
      });
    }

    /* ── Load PDFs for selected month ── */
    function loadEntry() {
      var entry = crosswordData[current];
      problemPdfFrame.src = PATH + entry.problemPdf;
      clearGrid();
    }

    /* ── Clear grid + hide solution ── */
    function clearGrid() {
      inputs.forEach(function (inp) { inp.value = ''; });
      statusText.textContent = '';
      solutionBox.style.display = 'none';
      solutionPdfFrame.src = '';
    }

    /* ── Show solution PDF ── */
    function showSolution() {
      var entry = crosswordData[current];
      solutionPdfFrame.src = PATH + entry.solutionPdf;
      solutionBox.style.display = 'block';
      solutionBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Check answers ── */
    function checkWin() {
      var entry = crosswordData[current];
      var allFilled  = true;
      var allCorrect = true;

      for (var i = 0; i < 4; i++) {
        var user = (inputs[i].value || '').trim();
        if (user === '') allFilled = false;
        if (user !== entry.answer[i]) allCorrect = false;
      }

      if (allCorrect && allFilled) {
        statusText.textContent = '🎉 You win!';
        showSolution();
      } else {
        statusText.textContent = '🚫 Incorrect — keep going!';
        solutionBox.style.display = 'none';
      }
    }

    /* ── Give Up ── */
    function giveUp() {
      statusText.textContent = '😔 Better luck next time!';
      showSolution();
    }

    /* ── Input behaviour ── */
    inputs.forEach(function (inp, i) {
      inp.setAttribute('maxlength', '1');

      inp.addEventListener('input', function (e) {
        var cleaned = (e.target.value || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 1);
        e.target.value = cleaned;
        if (cleaned) {
          inputs[(i + 1) % inputs.length].focus();
        }
      });

      inp.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          checkWin();
        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          inputs[(i + 1) % inputs.length].focus();
        } else if (e.key === 'ArrowLeft') {
          e.preventDefault();
          inputs[(i - 1 + inputs.length) % inputs.length].focus();
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          inputs[[2, 3, 0, 1][i]].focus();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          inputs[[2, 3, 0, 1][i]].focus();
        }
      });
    });

    /* ── Wire buttons ── */
    problemSelect.addEventListener('change', function () {
      current = Number(problemSelect.value);
      loadEntry();
    });
    checkBtn.addEventListener('click', checkWin);
    clearBtn.addEventListener('click', clearGrid);
    giveUpBtn.addEventListener('click', giveUp);

    /* ── Init ── */
    populateSelect();
    problemSelect.value = 0;
    loadEntry();
  })();
  </script>
