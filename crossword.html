  <canvas id="proximity-grid" aria-hidden="true"></canvas>
  <script>
  (function(){
    var canvas = document.getElementById('proximity-grid');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var mouse = { x: -9999, y: -9999 };
    var CELL = 36;
    var RADIUS = 180;
    var BASE_ALPHA = 0.045;
    var GLOW_ALPHA = 0.72;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      var cols = Math.ceil(canvas.width  / CELL) + 1;
      var rows = Math.ceil(canvas.height / CELL) + 1;

      for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
          var x = c * CELL;
          var y = r * CELL;
          var dx = x - mouse.x;
          var dy = y - mouse.y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          var proximity = Math.max(0, 1 - dist / RADIUS);
          var alpha = BASE_ALPHA + proximity * proximity * (GLOW_ALPHA - BASE_ALPHA);

          ctx.beginPath();
          ctx.arc(x, y, 1.4, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(84, 145, 209,' + alpha.toFixed(3) + ')';
          ctx.fill();
        }
      }

      ctx.setLineDash([]);
      for (var r2 = 0; r2 < rows; r2++) {
        var y2 = r2 * CELL;
        ctx.beginPath();
        ctx.moveTo(0, y2);
        ctx.lineTo(canvas.width, y2);
        var distH = Math.abs(mouse.y - y2);
        var pxH = Math.max(0, 1 - distH / RADIUS);
        ctx.strokeStyle = 'rgba(84, 145, 209,' + (BASE_ALPHA * 0.7 + pxH * pxH * 0.30).toFixed(3) + ')';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
      for (var c2 = 0; c2 < cols; c2++) {
        var x2 = c2 * CELL;
        ctx.beginPath();
        ctx.moveTo(x2, 0);
        ctx.lineTo(x2, canvas.height);
        var distV = Math.abs(mouse.x - x2);
        var pxV = Math.max(0, 1 - distV / RADIUS);
        ctx.strokeStyle = 'rgba(84, 145, 209,' + (BASE_ALPHA * 0.7 + pxV * pxV * 0.30).toFixed(3) + ')';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }

    function loop() { draw(); requestAnimationFrame(loop); }

    window.addEventListener('mousemove', function(e){ mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('touchmove', function(e){ if(e.touches[0]){ mouse.x=e.touches[0].clientX; mouse.y=e.touches[0].clientY; } }, {passive:true});
    window.addEventListener('resize', resize);
    resize();
    loop();
  })();
  </script>
  <div class="math-bg-layer" aria-hidden="true"></div>
  <script>
  (function(){
    var symbols=["π","e","i","∞","Σ","∫","√","dx","Δ","∇","α","β","γ","λ","μ","θ","φ","ψ","∅", "∈", "Ω","f(x)","n!","x²","2πr","πr²","a²+b²=c²","lim","log n","P(A|B)","det(A)","∮","mod p","C(n,k)","gcd","lcm","ℕ", "ℤ", "ℚ", "ℝ", "ℂ", "ℙ", "ℍ","σ²","E[X]","Var(X)","sin²+cos²=1","=", "≠", "≈", "≅", "≃", "≤", "≥","d/dx","ax²+bx+c","y=mx+b","e^{iπ}+1=0"];
    var layer=document.querySelector(".math-bg-layer");
    if(!layer)return;
    for(var k=0;k<58;k++){
      (function(idx){
        var el=document.createElement("span");
        el.className="math-symbol";
        el.textContent=symbols[idx%symbols.length];
        var size=0.85+Math.random()*1.5;
        var dur=22+Math.random()*30;
        var delay=-(Math.random()*dur);
        var left=Math.random()*98;
        var rot=(Math.random()-0.5)*50;
        el.style.cssText="left:"+left+"%;font-size:"+size+"rem;animation-duration:"+dur+"s;animation-delay:"+delay+"s;--rot:"+rot+"deg;";
        layer.appendChild(el);
      })(k+Math.floor(Math.random()*symbols.length));
    }
  })();
  </script>

  <script src="./crossword_problems.js"></script>
  <script>
    (function() {
    let currentProblem = problems[0];

    const problemSelect = document.getElementById('problemSelect');
    const problemsList = document.getElementById('problemsList');
    const statusText = document.getElementById('statusText');
    const solutionBox = document.getElementById('solutionBox');
    const solutionContent = document.getElementById('solutionContent');
    const inputs = [0,1,2,3].map(i => document.getElementById('c'+i));
    const checkBtn = document.getElementById('checkBtn');
    const clearBtn = document.getElementById('clearBtn');
    const prevSolBtn = document.getElementById('prevSol');
    const nextSolBtn = document.getElementById('nextSol');

    let current = 0;
    let solIdx = 0;

    function populateSelect(){
      problems.forEach((p, idx) => {
        const o = document.createElement('option');
        o.value = idx;
        o.textContent = p.name;
        problemSelect.appendChild(o);
      });
    }

    function loadProblems(){
      const p = problems[current];
      problemsList.innerHTML = p.problems.map((html, i) => `<div class="problem">${html}</div>`).join('');
      // render math
      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise();
      }
    }

    function clearGrid(){
      inputs.forEach(inp => inp.value = '');
      statusText.textContent = '';
      solutionBox.style.display = 'none';
    }

    function checkWin(){
      const p = problems[current];
      let allFilled = true;
      let allCorrect = true;

      for (let i=0; i<4; ++i) {
        const user = (inputs[i].value || '').trim();
        if (user === '') allFilled = false;
        if (user !== p.answer[i]) allCorrect = false;
      }

      if (allCorrect && allFilled) {
        statusText.textContent = '🎉 You win!';
        showSolution(0);
      } else {
        statusText.textContent = 'Incorrect; keep trying!';
        solutionBox.style.display = 'none';
      }
    }

    /* show solutions (with arrows) */
    function showSolution(idx){
      const p = problems[current];
      solIdx = ((idx % p.solutions.length) + p.solutions.length) % p.solutions.length;
      solutionContent.innerHTML = p.solutions[solIdx];
      solutionBox.style.display = 'block';
      if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise();
    }

    /* wire events */
    problemSelect.addEventListener('change', () => {
      current = Number(problemSelect.value);
      loadProblems();
      clearGrid();
    });

    checkBtn.addEventListener('click', checkWin);
    clearBtn.addEventListener('click', clearGrid);
    nextSolBtn.addEventListener('click', () => showSolution(solIdx + 1));
    prevSolBtn.addEventListener('click', () => showSolution(solIdx - 1));

    inputs.forEach((inp, i) => {
    inp.setAttribute('maxlength', '1');

    inp.addEventListener('input', (e) => {
        // keep only the first alphanumeric char and uppercase it
        const cleaned = (e.target.value || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0,1);
        e.target.value = cleaned;

        // auto-advance if cell now has a character
        if (cleaned) {
        const nextIndex = (i + 1) % inputs.length;
        inputs[nextIndex].focus();
        }
    });

    // keep keyboard navigation working (arrows + Enter)
    inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
        e.preventDefault();
        checkWin();
        } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        inputs[(i+1) % inputs.length].focus();
        } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        inputs[(i-1+inputs.length) % inputs.length].focus();
        } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        const map = [2,3,0,1];
        inputs[map[i]].focus();
        } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        const map = [2,3,0,1];
        inputs[map[i]].focus();
        }
    });
    });
    populateSelect();
    problemSelect.value = 0;
    loadProblems();
    clearGrid();

    })();
  </script>
